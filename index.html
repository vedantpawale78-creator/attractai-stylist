<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AttractAI Stylist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@11.0.8/dist/framer-motion.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: white; margin: 0; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1); }
        .glass-panel { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 16px; }
        .gradient-text { background: linear-gradient(135deg, #a855f7 0%, #ec4899 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .gradient-bg { background: linear-gradient(135deg, #a855f7 0%, #ec4899 100%); }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 500: '#a855f7', 600: '#ec4899' }
                    }
                }
            }
        }
    </script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        const { useState, useEffect, useRef } = React;
        const { motion, AnimatePresence } = window.Motion;

        const UploadIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className="mx-auto mb-4 text-brand-500">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="17 8 12 3 7 8"></polyline>
                <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
        );

        const App = () => {
            const [file, setFile] = useState(null);
            const [preview, setPreview] = useState(null);
            const [analyzing, setAnalyzing] = useState(false);
            const [results, setResults] = useState(null);
            const [activeTab, setActiveTab] = useState('Analysis');

            const handleDrop = (e) => {
                e.preventDefault();
                const droppedFile = e.dataTransfer.files[0];
                if (droppedFile) processFile(droppedFile);
            };

            const handleChange = (e) => {
                const selectedFile = e.target.files[0];
                if (selectedFile) processFile(selectedFile);
            };

            const processFile = (file) => {
                setFile(file);
                const reader = new FileReader();
                reader.onloadend = () => setPreview(reader.result);
                reader.readAsDataURL(file);
                analyzeImage();
            };

            const analyzeImage = () => {
                setAnalyzing(true);
                // Mock API call to Gemini/Imagen (<3s response)
                setTimeout(() => {
                    setResults({
                        score: 82,
                        analysis: {
                            face: "Symmetric features with a distinct jawline. Skin tone is even but could benefit from hydration.",
                            body: "Athletic/Proportionate build. Posture is slightly slouched.",
                            overall: "High baseline attractiveness with great potential through minor styling tweaks."
                        },
                        suggestions: {
                            Clothes: ["Tailored navy blazer for sharper silhouette", "Slim-fit dark wash jeans", "Minimalist white sneakers", "Earth-tone knit polo"],
                            Hairstyle: ["Textured crop with a mid fade", "Use matte styling clay for definition", "Trim sideburns to align with cheekbones"],
                            Glasses: ["Geometric wireframes", "Tortoise shell clubmasters to contrast face shape"],
                            Makeup: ["Light BB cream for even skin tone", "Matte lip balm", "Subtle brow gel for definition"]
                        },
                        improvements: [
                            "Improve posture: pull shoulders back to broaden chest.",
                            "Skincare routine: Add a daily vitamin C serum and moisturizer.",
                            "Grooming: Keep facial hair trimmed to 3mm for a structured shadow."
                        ]
                    });
                    setAnalyzing(false);
                }, 2500);
            };

            return (
                <div className="min-h-screen relative overflow-hidden flex flex-col items-center py-12 px-4 sm:px-6 lg:px-8">
                    <div className="absolute top-[0%] left-[-10%] w-[50%] h-[50%] bg-brand-500 rounded-full mix-blend-multiply filter blur-[150px] opacity-20"></div>
                    <div className="absolute bottom-[0%] right-[-10%] w-[50%] h-[50%] bg-brand-600 rounded-full mix-blend-multiply filter blur-[150px] opacity-20"></div>
                    
                    <div className="w-full max-w-4xl z-10">
                        <header className="text-center mb-12">
                            <motion.h1 initial={{y: -20, opacity: 0}} animate={{y: 0, opacity: 1}} className="text-5xl font-bold mb-4 tracking-tight"><span className="gradient-text">AttractAI</span> Stylist</motion.h1>
                            <motion.p initial={{y: -20, opacity: 0}} animate={{y: 0, opacity: 1}} transition={{delay: 0.1}} className="text-slate-400 text-lg">Upload your photo. Let AI upgrade your aesthetic.</motion.p>
                        </header>

                        {!results && !analyzing && (
                            <motion.div 
                                initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} transition={{delay: 0.2}}
                                className="glass p-16 text-center relative border-2 border-dashed border-slate-600/50 hover:border-brand-500/50 transition-colors cursor-pointer"
                                onDragOver={(e) => e.preventDefault()}
                                onDrop={handleDrop}
                            >
                                <input id="file-upload" type="file" className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" onChange={handleChange} accept="image/*" />
                                <UploadIcon />
                                <h3 className="text-2xl font-semibold mb-2 text-white">Drag & Drop your photo</h3>
                                <p className="text-slate-400">or click to browse from your device</p>
                                <p className="text-xs text-slate-500 mt-8">Secure analysis. Photos are processed locally.</p>
                            </motion.div>
                        )}

                        {analyzing && (
                            <motion.div 
                                initial={{ opacity: 0 }} animate={{ opacity: 1 }}
                                className="glass p-16 flex flex-col items-center justify-center min-h-[400px]"
                            >
                                <div className="w-20 h-20 border-4 border-slate-700 border-t-brand-500 rounded-full animate-spin mb-8"></div>
                                <h3 className="text-2xl font-medium text-white mb-2">Analyzing Features...</h3>
                                <p className="text-slate-400">Scanning facial symmetry, body proportions, and styling vectors (Powered by Gemini Vision)</p>
                            </motion.div>
                        )}

                        {results && (
                            <motion.div 
                                initial={{ opacity: 0, y: 20 }}
                                animate={{ opacity: 1, y: 0 }}
                                className="flex flex-col lg:flex-row gap-8"
                            >
                                <div className="lg:w-1/3 flex flex-col gap-6">
                                    <div className="glass p-3">
                                        <img src={preview} alt="Your photo" className="w-full h-auto rounded-xl object-cover shadow-lg" />
                                    </div>
                                    <div className="glass p-6 text-center">
                                        <p className="text-slate-400 uppercase tracking-widest text-xs font-bold mb-3">Aesthetic Score</p>
                                        <div className="text-7xl font-bold gradient-text mb-2">{results.score}</div>
                                        <div className="w-full bg-slate-800 rounded-full h-2 mb-3"><div className="bg-gradient-to-r from-brand-500 to-brand-600 h-2 rounded-full" style={{width: `${results.score}%`}}></div></div>
                                        <p className="text-xs text-emerald-400 font-medium">Top 18% aesthetic potential</p>
                                    </div>
                                </div>

                                <div className="lg:w-2/3 glass p-2 flex flex-col">
                                    <div className="flex border-b border-white/10 p-2 overflow-x-auto gap-2">
                                        {['Analysis', 'Suggestions', 'Improvements', 'Profile'].map(tab => (
                                            <button 
                                                key={tab}
                                                onClick={() => setActiveTab(tab)}
                                                className={`px-5 py-2.5 rounded-xl text-sm font-semibold transition-all ${activeTab === tab ? 'gradient-bg text-white shadow-lg' : 'text-slate-400 hover:text-white hover:bg-white/5'}`}
                                            >
                                                {tab}
                                            </button>
                                        ))}
                                    </div>
                                    
                                    <div className="p-6 flex-1">
                                        <AnimatePresence mode="wait">
                                            {activeTab === 'Analysis' && (
                                                <motion.div key="Analysis" initial={{ opacity: 0, x: 10 }} animate={{ opacity: 1, x: 0 }} exit={{ opacity: 0, x: -10 }} className="space-y-4">
                                                    <div className="glass-panel p-5">
                                                        <h4 className="text-brand-400 mb-2 font-bold text-sm uppercase tracking-wider">Face</h4>
                                                        <p className="text-slate-300 text-sm leading-relaxed">{results.analysis.face}</p>
                                                    </div>
                                                    <div className="glass-panel p-5">
                                                        <h4 className="text-brand-400 mb-2 font-bold text-sm uppercase tracking-wider">Body</h4>
                                                        <p className="text-slate-300 text-sm leading-relaxed">{results.analysis.body}</p>
                                                    </div>
                                                    <div className="glass-panel p-5">
                                                        <h4 className="text-brand-400 mb-2 font-bold text-sm uppercase tracking-wider">Overall</h4>
                                                        <p className="text-slate-300 text-sm leading-relaxed">{results.analysis.overall}</p>
                                                    </div>
                                                </motion.div>
                                            )}

                                            {activeTab === 'Suggestions' && (
                                                <motion.div key="Suggestions" initial={{ opacity: 0, x: 10 }} animate={{ opacity: 1, x: 0 }} exit={{ opacity: 0, x: -10 }} className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                    {Object.entries(results.suggestions).map(([category, items]) => (
                                                        <div key={category} className="glass-panel p-5">
                                                            <h4 className="text-white mb-3 font-semibold pb-2 border-b border-white/10">{category}</h4>
                                                            <ul className="space-y-3">
                                                                {items.map((item, i) => (
                                                                    <li key={i} className="text-slate-300 text-sm flex items-start gap-2">
                                                                        <span className="text-brand-500 mt-0.5">&rarr;</span> <a href="#" className="hover:text-brand-400 transition-colors underline decoration-brand-500/30 underline-offset-4">{item}</a>
                                                                    </li>
                                                                ))}
                                                            </ul>
                                                        </div>
                                                    ))}
                                                    <div className="col-span-full glass-panel p-5 mt-2 flex justify-between items-center border border-brand-500/30 bg-brand-500/5">
                                                        <div>
                                                            <h4 className="text-white font-semibold">Ready to test these out?</h4>
                                                            <p className="text-slate-400 text-sm mt-1">Generate AI previews using Imagen 3</p>
                                                        </div>
                                                        <button className="gradient-bg text-white px-6 py-2 rounded-lg font-medium shadow-lg hover:opacity-90 transition-opacity">Generate Previews</button>
                                                    </div>
                                                </motion.div>
                                            )}

                                            {activeTab === 'Improvements' && (
                                                <motion.div key="Improvements" initial={{ opacity: 0, x: 10 }} animate={{ opacity: 1, x: 0 }} exit={{ opacity: 0, x: -10 }} className="space-y-4">
                                                    {results.improvements.map((imp, i) => (
                                                        <div key={i} className="glass-panel p-5 border-l-4 border-l-brand-500 flex items-center gap-4">
                                                            <div className="bg-brand-500/20 text-brand-400 w-10 h-10 shrink-0 rounded-full flex items-center justify-center font-bold">
                                                                {i + 1}
                                                            </div>
                                                            <p className="text-slate-300 text-sm">{imp}</p>
                                                        </div>
                                                    ))}
                                                </motion.div>
                                            )}

                                            {activeTab === 'Profile' && (
                                                <motion.div key="Profile" initial={{ opacity: 0, x: 10 }} animate={{ opacity: 1, x: 0 }} exit={{ opacity: 0, x: -10 }} className="text-center py-16">
                                                    <div className="w-24 h-24 bg-slate-800 rounded-full mx-auto mb-4 flex items-center justify-center border-2 border-slate-700 shadow-xl">
                                                        <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-slate-500"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                                                    </div>
                                                    <h3 className="text-2xl font-semibold text-white">Guest User</h3>
                                                    <p className="text-brand-400 mb-8 font-medium">Anonymous Session Active</p>
                                                    <button onClick={() => {setResults(null); setPreview(null); setActiveTab('Analysis');}} className="text-sm bg-white/5 border border-white/10 hover:bg-white/10 transition-colors px-8 py-3 rounded-xl text-white font-medium">Start New Analysis</button>
                                                </motion.div>
                                            )}
                                        </AnimatePresence>
                                    </div>
                                </div>
                            </motion.div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
